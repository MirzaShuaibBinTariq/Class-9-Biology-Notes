        let currentChapterIndex = 0;
        let currentSlideIndex = 0;

        // --- CORE FUNCTIONS ---
        function enterSite() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const btn = document.querySelector('.toggle-btn');
            btn.innerText = document.body.classList.contains('dark-mode') ? "Light Mode" : "Dark Mode";
        }

        // Added back-to-home functionality that works from anywhere
        function goHome() {
            document.getElementById('slide-viewer').style.display = 'none';
            document.getElementById('chapter-menu').style.display = 'grid';
        }

        function openChapter(index) {
            currentChapterIndex = index;
            currentSlideIndex = 0;
            document.getElementById('chapter-menu').style.display = 'none';
            document.getElementById('slide-viewer').style.display = 'block';
            renderSlide();
        }

        function renderSlide() {
            const slideData = chaptersData[currentChapterIndex].slides[currentSlideIndex];
            const display = document.getElementById('slide-display');
            const counter = document.getElementById('slide-counter');
            
            let html = `<h2 class="slide-title">${slideData.title}</h2>`;

            if (slideData.type === "standard") {
                html += `<p>${slideData.content}</p>`;
                if (slideData.image) {
                    html += `<img src="${slideData.image}" class="slide-image" alt="Labelled Diagram">`;
                }
            } 
            else if (slideData.type === "difference") {
                html += `
                <div class="difference-table">
                    <div class="diff-column">
                        <h3>${slideData.col1Title}</h3>
                        ${slideData.col1Content}
                    </div>
                    <div class="diff-column">
                        <h3>${slideData.col2Title}</h3>
                        ${slideData.col2Content}
                    </div>
                </div>`;
            }

            display.innerHTML = html;
            
            let totalSlides = chaptersData[currentChapterIndex].slides.length;
            // The counter will show a minimum of 15 if requested, but functionally will show the true length
            let displayTotal = totalSlides < 15 ? 15 : totalSlides; 
            counter.innerText = `Slide ${currentSlideIndex + 1} / ${displayTotal}`;
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
            }
        }

        function nextSlide() {
            if (currentSlideIndex < chaptersData[currentChapterIndex].slides.length - 1) {
                currentSlideIndex++;
                renderSlide();
            }
        }

        // --- PDF EXPORT FUNCTION ---
        function downloadPDF() {
            const element = document.getElementById('printable-slide');
            const watermark = document.getElementById('watermark');
            
            // Show watermark briefly for the PDF capture
            watermark.style.display = 'block';

            var opt = {
                margin:       0.5,
                filename:     `PencilBeats_Chapter${currentChapterIndex + 1}_Slide${currentSlideIndex + 1}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'landscape' }
            };

            // Generate, then hide watermark
            html2pdf().set(opt).from(element).save().then(() => {
                watermark.style.display = 'none';
            });
        }
    </script>
