<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pencil Beats</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#dbeafe,#fce7f3);
}

/* INTRO */
#intro {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#0ea5e9;
  color:white;
  cursor:pointer;
  text-align:center;
}

#intro h1 {font-size:4rem;}
#intro p {font-size:1.5rem;}

/* HEADER */
.header {
  display:flex;
  align-items:center;
  gap:15px;
  padding:20px;
}
.header img {width:100px;}
.header h1 {font-size:2.5rem;}

/* CHAPTERS */
.chapters {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:20px;
}
.chapter {
  background:white;
  padding:25px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  font-size:1.2rem;
}

/* SLIDES */
.slide-container {display:none;padding:20px;}

.slide {
  display:flex;
  gap:30px;
  background:white;
  padding:30px;
  border-radius:15px;
  margin-bottom:30px;
  min-height:80vh;
  align-items:center;
}

.slide img {
  width:45%;
  border-radius:10px;
}

.text {
  width:55%;
  font-size:1.2rem;
  line-height:1.7;
}

.divider {
  border-top:2px solid #ccc;
  margin:10px 0;
}

/* QUIZ */
.quiz {
  display:none;
  background:white;
  padding:20px;
  margin:20px;
  border-radius:15px;
}

/* MOBILE */
@media(max-width:768px){
  .slide {flex-direction:column;}
  .slide img,.text {width:100%;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <h1>Pencil Beats</h1>
  <p>Tap anywhere on screen to proceed</p>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Chinar_leaf.svg">
<h1>Pencil Beats</h1>
</div>

<div class="chapters">
<div class="chapter" onclick="loadCell()">Fundamental Unit of Life</div>
<div class="chapter" onclick="loadTissues()">Tissues</div>
<div class="chapter" onclick="loadFood()">Improvement in Food Resources</div>
<div class="chapter" onclick="loadDrug()">Drug Abuse & STDs</div>
</div>

<div id="slides" class="slide-container"></div>
<div id="quiz" class="quiz"></div>

</div>

<script>

/* INTRO */
intro.onclick=()=>{
intro.style.display="none";
main.style.display="block";
};

/* LOAD FUNCTIONS */
function showSlides(content){
document.querySelector(".chapters").style.display="none";
slides.style.display="block";
slides.innerHTML=content;
}

/* CHAPTER 1 */
function loadCell(){
showSlides(`
<div class="slide">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Animal_cell_structure_en.svg">
<div class="text">
<h2>What is a Cell?</h2>
<p>A cell is the smallest structural and functional unit of life capable of performing all essential biological processes. Every organism is made of cells. Discovered by Robert Hooke (1665). Cells carry genetic material and perform metabolism, growth and reproduction.</p>
</div>
</div>

<div class="slide">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Prokaryote_cell.svg">
<div class="text">
<h2>Prokaryotic vs Eukaryotic</h2>
<p><b>Prokaryotic:</b> No true nucleus, simple, bacteria</p>
<div class="divider"></div>
<p><b>Eukaryotic:</b> True nucleus, complex, plants & animals</p>
</div>
</div>

<div class="slide">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/e4/Cell_membrane_detailed_diagram_en.svg">
<div class="text">
<h2>Plasma Membrane</h2>
<p>Selective barrier controlling entry and exit. Maintains balance and protects cell.</p>
</div>
</div>

<button onclick="startQuiz()">Finish Chapter → Quiz</button>
`);
}

/* TISSUES */
function loadTissues(){
showSlides(`
<div class="slide">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Plant_cell_structure.svg">
<div class="text">
<h2>What is Tissue?</h2>
<p>A tissue is a group of similar cells working together to perform a specific function.</p>
</div>
</div>

<div class="slide">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/68/Meristematic_cells.jpg">
<div class="text">
<h2>Meristematic Tissue</h2>
<p>Cells that continuously divide and help plant growth.</p>
</div>
</div>
<button onclick="startQuiz()">Finish Chapter → Quiz</button>
`);
}

/* FOOD */
function loadFood(){
showSlides(`
<div class="slide">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Crops.jpg">
<div class="text">
<h2>Crop Yield Improvement</h2>
<p>Scientific methods to increase food production.</p>
</div>
</div>

<div class="slide">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Irrigation.jpg">
<div class="text">
<h2>Irrigation</h2>
<p>Artificial supply of water to crops.</p>
</div>
</div>
<button onclick="startQuiz()">Finish Chapter → Quiz</button>
`);
}

/* DRUG */
function loadDrug(){
showSlides(`
<div class="slide">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2e/Brain_diagram.svg">
<div class="text">
<h2>Drug Abuse</h2>
<p>Harmful use of drugs affecting body and mind.</p>
</div>
</div>

<div class="slide">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/1c/HIV_virus.jpg">
<div class="text">
<h2>STDs</h2>
<p>Diseases transmitted through unsafe contact like HIV.</p>
</div>
</div>
<button onclick="startQuiz()">Finish Chapter → Quiz</button>
`);
}

/* QUIZ */
function startQuiz(){
slides.style.display="none";
quiz.style.display="block";

let questions=[
"What is cell?",
"What is tissue?",
"What is irrigation?",
"What is drug abuse?",
"What are STDs?"
];

questions.sort(()=>Math.random()-0.5);

let html="<h2>Quiz</h2>";
questions.forEach((q,i)=>{
html+=`<p>${i+1}. ${q}</p><input><br>`;
});

quiz.innerHTML=html;
}

</script>

</body>
</html>
